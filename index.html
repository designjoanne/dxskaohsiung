<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 DxS 高雄演唱會隨身手冊</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* SEVENTEEN 應援色 */
            --rose-quartz: #F7CAC9;
            --serenity: #92A8D1;
            --bg-light: #fdfcfc;
            --text-main: #555555;
            --white: #ffffff;
            --border-radius: 16px;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, "Noto Sans TC", sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 90px;
        }

        /* 頁首 */
        header {
            background: linear-gradient(135deg, var(--rose-quartz) 0%, var(--serenity) 100%);
            padding: 2.5rem 1rem;
            text-align: center;
            color: white;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: var(--shadow);
        }

        .header-icon { font-size: 3rem; margin-bottom: 0.5rem; display: block; }
        h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: 1px; }

        /* 導覽列 (Tab Bar) */
        .tab-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #aaa;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
        }

        .tab-item i { font-size: 1.2rem; margin-bottom: 4px; }
        .tab-item.active { color: var(--serenity); font-weight: bold; }

        /* 內容區塊 */
        .content-section {
            display: none;
            max-width: 600px;
            margin: 0 auto;
            padding: 1.5rem;
            animation: fadeIn 0.4s ease;
        }

        .content-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 行李清單樣式 */
        .luggage-card {
            background: var(--white);
            border-radius: var(--border-radius);
            padding: 1.2rem;
            box-shadow: var(--shadow);
        }

        .check-item {
            display: flex;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
        }

        .check-item:last-child { border: none; }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            margin-right: 12px;
            accent-color: var(--serenity);
            cursor: pointer;
        }

        input[type="checkbox"]:checked + span {
            text-decoration: line-through;
            color: #ccc;
        }

        /* 行程卡片 */
        .day-title {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            color: var(--serenity);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .event-card {
            background: var(--white);
            border-radius: var(--border-radius);
            padding: 1.2rem;
            margin-bottom: 1.2rem;
            box-shadow: var(--shadow);
            /* 預設為粉色直條 */
            border-left: 6px solid var(--rose-quartz); 
        }

        /* 指定為藍色直條的類別 */
        .event-card.blue-bar {
            border-left-color: var(--serenity);
        }

        .event-time {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--serenity);
            display: block;
        }

        .event-title { font-weight: 700; font-size: 1.1rem; margin: 4px 0; }

        .tag {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 10px;
            border-radius: 20px;
            background: #f0f0f0;
            margin-right: 5px;
        }

        .tag-booked { background: var(--serenity); color: white; }
        .tag-important { background: var(--rose-quartz); color: white; }

        .note-box {
            background: #fdf6f6;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-top: 10px;
            border-left: 3px solid var(--rose-quartz);
        }

        /* 藍色卡片的備註盒顏色也稍微調整 */
        .blue-bar .note-box {
            background: #f4f7fc;
            border-left-color: var(--serenity);
        }

        .map-btn {
            display: block;
            text-align: center;
            background: #fff;
            border: 1px solid var(--serenity);
            color: var(--serenity);
            text-decoration: none;
            padding: 8px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .map-btn:active { background: var(--serenity); color: white; }

    </style>
</head>
<body>

        <span class="header-icon">💎</span>
        <h1>2026 DxS 高雄演唱會</h1>
    </header>
